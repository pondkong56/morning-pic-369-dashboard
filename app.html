<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Morning Pic 369 App</title>
  <style>
    :root {
      --bg: #f8f1e5;
      --bg-soft: #fff8ef;
      --shell: #fffdf8;
      --card: #ffffff;
      --line: #efe4d2;
      --ink: #163b73;
      --text: #4d6283;
      --muted: #8b99ae;
      --navy: #163b73;
      --navy-soft: #eef3fb;
      --sun: #ffb92b;
      --sun-deep: #ff7d1f;
      --sun-soft: #fff4dd;
      --ok: #e9f4ff;
      --ok-ink: #315d98;
      --warn: #fff1dc;
      --warn-ink: #b36a16;
      --danger: #fff0ef;
      --danger-ink: #d55a5a;
      --shadow: 0 24px 60px rgba(22, 59, 115, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: Inter, "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.92), transparent 28%),
        radial-gradient(circle at top right, rgba(255,190,76,0.12), transparent 26%),
        linear-gradient(180deg, #fff6ea 0%, #fbf2e5 16%, #f6edde 100%);
      line-height: 1.45;
    }

    button, input, select { font: inherit; }

    .app-shell {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #fffdf8 0%, #fff8ef 100%);
      border-right: 1px solid var(--line);
      padding: 18px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      padding: 6px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #fffdf8;
      flex: 0 0 auto;
    }

    .brand-mark svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .brand-copy strong {
      display: block;
      font-size: 24px;
      line-height: 1;
    }

    .brand-copy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .menu {
      display: grid;
      gap: 8px;
    }

    .menu button {
      border: 0;
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      padding: 11px 12px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 800;
    }

    .menu button.active {
      background: linear-gradient(135deg, #fff4e2, #fffaf1);
      color: var(--ink);
      box-shadow: inset 0 0 0 1px #ffe5c2;
    }

    .menu-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid #e4d8c7;
      background: #fff;
      color: var(--navy);
      font-size: 11px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .sidebar-actions {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .ghost-btn,
    .primary-btn {
      min-height: 42px;
      border-radius: 14px;
      border: 1px solid var(--line);
      cursor: pointer;
      padding: 0 14px;
      font-weight: 800;
    }

    .ghost-btn {
      background: #fff;
      color: var(--text);
    }

    .primary-btn {
      border: 0;
      background: linear-gradient(135deg, var(--navy), #2858a2);
      color: #fff;
    }

    .sidebar-note {
      color: var(--muted);
      font-size: 12px;
      margin: 0;
    }

    .main {
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.92);
      border-radius: 24px;
      padding: 16px 18px;
      box-shadow: 0 18px 40px rgba(22, 59, 115, 0.06);
      backdrop-filter: blur(12px);
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1.02;
    }

    .topbar p {
      margin: 6px 0 0;
      color: var(--text);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .field {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .content {
      margin-top: 18px;
      display: grid;
      gap: 18px;
    }

    .section {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-head h2,
    .section-head h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.08;
    }

    .section-sub {
      color: var(--muted);
      font-size: 13px;
      margin: 4px 0 0;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .kpi-card,
    .info-card,
    .list-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 14px 34px rgba(54, 82, 75, 0.06);
      min-width: 0;
    }

    .kpi-card .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .kpi-card .value {
      display: block;
      margin-top: 10px;
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
    }

    .kpi-card .hint {
      display: block;
      margin-top: 8px;
      color: var(--text);
      font-size: 12px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    .three-col {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .chip.sun { background: #fff5e7; color: var(--navy); border-color: #ffe0b2; }
    .chip.blue { background: #eef4ff; color: var(--navy); border-color: #dbe6fb; }
    .chip.warn { background: var(--warn); color: var(--warn-ink); border-color: #ffd9a2; }
    .chip.danger { background: var(--danger); color: var(--danger-ink); border-color: #ffd8d8; }

    .package-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .package-card strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }

    .package-card .price {
      font-size: 28px;
      font-weight: 900;
      color: var(--navy);
    }

    .package-card p {
      margin: 8px 0 0;
      color: var(--text);
      font-size: 13px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th,
    .table td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    .table th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .table tr:last-child td { border-bottom: 0; }

    .stat-list {
      display: grid;
      gap: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    .stat-row:last-child { border-bottom: 0; }
    .stat-row strong { font-size: 14px; }
    .stat-row span { color: var(--text); }

    .empty-state {
      border: 1px dashed #e7d8c4;
      border-radius: 18px;
      padding: 16px;
      color: var(--text);
      background: #fffaf3;
      font-size: 13px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .form-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field-block {
      display: grid;
      gap: 6px;
    }

    .field-block label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .field-input {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .inline-note {
      margin-top: 10px;
      color: var(--text);
      font-size: 12px;
    }

    .alert-card {
      border: 1px solid #ffd9a2;
      background: linear-gradient(135deg, #fff8ee, #fff2dc);
    }

    @media (max-width: 1100px) {
      .app-shell,
      .two-col,
      .three-col {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
      }

      .kpi-grid,
      .package-grid,
      .form-grid,
      .form-grid.three {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .main { padding: 12px; }
      .topbar { padding: 14px; }
      .section { padding: 14px; border-radius: 22px; }
      .kpi-grid,
      .package-grid,
      .form-grid,
      .form-grid.three {
        grid-template-columns: 1fr;
      }
      .toolbar { justify-content: flex-start; }
    }
  </style>
</head>

    function buildClientId() {
      const seeded = `${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
      return `browser-${seeded}`;
    }

    function buildOpId() {
      return `op-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    }

    function ensureSyncState(data) {
      data.sync = data.sync || {};
      data.sync.mode = data.sync.mode || "local-first";
      data.sync.backendStatus = data.sync.backendStatus || "not-connected";
      data.sync.clientId = data.sync.clientId || buildClientId();
      data.sync.lastAttemptAt = data.sync.lastAttemptAt || "";
      data.sync.lastSuccessAt = data.sync.lastSuccessAt || "";
      data.sync.outbox = Array.isArray(data.sync.outbox) ? data.sync.outbox : [];
      data.sync.history = Array.isArray(data.sync.history) ? data.sync.history : [];
      return data;
    }

    function ensureSyncRecord(record, remoteEntity, defaults = {}) {
      const createdAt = record.createdAt || record.updatedAt || isoNow();
      return {
        entity: remoteEntity,
        version: Number(record.version || 1),
        createdAt,
        updatedAt: record.updatedAt || createdAt,
        updatedBy: record.updatedBy || "owner",
        syncStatus: record.syncStatus || "synced",
        lastSyncedAt: record.lastSyncedAt || "",
        lastError: record.lastError || "",
        ...defaults,
        ...record
      };
    }

    function touchSyncRecord(record, remoteEntity, actorId = "owner", actorType = "human") {
      const now = isoNow();
      record.entity = remoteEntity;
      record.version = Number(record.version || 0) + 1;
      record.createdAt = record.createdAt || now;
      record.updatedAt = now;
      record.updatedBy = actorId;
      record.lastTouchedBy = actorId;
      record.lastTouchedByType = actorType;
      record.syncStatus = "pending";
      record.lastError = "";
      return record;
    }

    function queueSyncOperation(localKey, record, operationType = "UPSERT_ENTITY") {
      const mapping = SYNC_ENTITY_MAP[localKey];
      if (!mapping || !record?.id) return;
      ensureSyncState(state.data);
      const opId = buildOpId();
      const nextRecord = clone(record);
      state.data.sync.outbox = state.data.sync.outbox.filter((item) => {
        return !(item.entity === mapping.remoteEntity && item.recordId === record.id && item.status === "pending");
      });
      state.data.sync.outbox.push({
        id: opId,
        opId,
        type: operationType,
        entity: mapping.remoteEntity,
        localKey,
        recordId: record.id,
        status: "pending",
        queuedAt: isoNow(),
        record: nextRecord
      });
      state.data.sync.history = state.data.sync.history.slice(-11);
      state.data.sync.history.unshift({
        id: `history-${opId}`,
        action: "queued",
        entity: mapping.remoteEntity,
        recordId: record.id,
        at: isoNow()
      });
    }

    function getSyncRecordsByEntity(localKey, recordId) {
      return (state.data[localKey] || []).filter((item) => item.id === recordId);
    }

    function buildSyncPayload() {
      ensureSyncState(state.data);
      return {
        businessId: "morning-pic-369",
        clientId: state.data.sync.clientId,
        sentAt: isoNow(),
        operations: state.data.sync.outbox
          .filter((item) => item.status === "pending")
          .map((item) => ({
            opId: item.opId,
            type: item.type,
            entity: item.entity,
            record: clone(item.record)
          }))
      };
    }

    function exportSyncPayload() {
      const payload = buildSyncPayload();
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "morning-pic-369-sync-payload.json";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function simulateSyncSuccess() {
      ensureSyncState(state.data);
      const now = isoNow();
      const pendingItems = state.data.sync.outbox.filter((item) => item.status === "pending");
      if (!pendingItems.length) return;

      pendingItems.forEach((item) => {
        const records = getSyncRecordsByEntity(item.localKey, item.recordId);
        records.forEach((record) => {
          record.syncStatus = "synced";
          record.lastSyncedAt = now;
          record.lastError = "";
        });
        item.status = "accepted";
      });

      state.data.sync.backendStatus = "ready-for-worker";
      state.data.sync.lastAttemptAt = now;
      state.data.sync.lastSuccessAt = now;
      state.data.sync.history = state.data.sync.history.slice(-11);
      state.data.sync.history.unshift({
        id: `history-sync-${Date.now()}`,
        action: "simulated-sync",
        entity: "batch",
        recordId: `${pendingItems.length} records`,
        at: now
      });
      saveData();
      render();
    }

    function ensureAgentReadyItem(item, defaults = {}) {
      return {
        executionMode: "manual",
        assignedAgent: "",
        agentStatus: "idle",
        lastTouchedBy: "owner",
        lastTouchedByType: "human",
        handoffNote: "",
        ...defaults,

    function ensureAgentReadySchema(data) {
      data.settings = data.settings || {};
      data.settings.availableAgents = data.settings.availableAgents || ["AI Assistant", "Content Agent", "Ad Agent", "Sales Agent", "Production Agent"];
      ensureSyncState(data);
      data.automation = data.automation || {
        agentReady: true,
        handoffMode: "human-in-the-loop",
        queues: [
          { id: "content-calendar", label: "Content Queue", defaultAgent: "Content Agent" },
          { id: "weekly-ads", label: "Ad Creative Queue", defaultAgent: "Ad Agent" },
          { id: "chat-monitor", label: "Sales Chat Queue", defaultAgent: "Sales Agent" },
          { id: "production", label: "Production Queue", defaultAgent: "Production Agent" }
        ]
      };

      data.contentPosts = (data.contentPosts || []).map((item) => ensureAgentReadyItem(item, { agentType: "content" }));
      data.weeklyAdCreatives = (data.weeklyAdCreatives || []).map((item) => ensureAgentReadyItem(item, { agentType: "ad-creative" }));
      data.adCampaigns = (data.adCampaigns || []).map((item) => ensureAgentReadyItem(item, { agentType: "ad-ops" }));
      data.chats = (data.chats || []).map((item) => ensureAgentReadyItem(item, { agentType: "sales-chat" }));
      data.orders = (data.orders || []).map((item) => ensureSyncRecord(ensureAgentReadyItem(item, { agentType: "order-ops" }), "orders"));
      data.production = (data.production || []).map((item) => ensureSyncRecord(ensureAgentReadyItem(item, { agentType: "production" }), "production_jobs"));

      return data;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          const seeded = ensureAgentReadySchema(clone(sampleData));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
          return seeded;
        }
        return ensureAgentReadySchema(JSON.parse(raw));
      } catch {
        return ensureAgentReadySchema(clone(sampleData));
      }
    }

      state.data = ensureAgentReadySchema(state.data);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));

      const startStatus = state.data.settings.productionStatuses?.[0] || "รอเริ่ม";
      const job = ensureSyncRecord(ensureAgentReadyItem({

        orderId: order.id,

        packageName: order.packageName,
        images: pkg ? pkg.images : 0,

        dueDate: state.date,

        revisions: 0,
        issue: ""
      }, { agentType: "production" }), "production_jobs");
      touchSyncRecord(job, "production_jobs");
      state.data.production.push(job);

    function addOrder(form) {
      const pkg = getPackageByName(form.packageName);
      if (!form.customer || !pkg) return;
      const nextOrder = ensureSyncRecord(ensureAgentReadyItem({

        customer: form.customer,

        amount: pkg.price,
        paymentStatus: form.paymentStatus,
        billingStatus: form.billingStatus,
        fulfillmentStatus: form.fulfillmentStatus
      }, { agentType: "order-ops" }), "orders");
      touchSyncRecord(nextOrder, "orders");
      state.data.orders.unshift(nextOrder);
      queueSyncOperation("orders", nextOrder);
      if (isPaidOrderStatus(nextOrder.paymentStatus)) {
        createProductionFromOrder(nextOrder);
      }
      saveData();
      render();
    }

    function updateOrderField(id, field, value) {
      const order = state.data.orders.find((item) => item.id === id);
      if (!order) return;
      const paidStatus = state.data.settings.orderStatuses?.[2] || "ชำระครบ";
      const deliveredOrderStatus = state.data.settings.orderStatuses?.[5] || "ส่งแล้ว";
      const deliveredProductionStatus = state.data.settings.productionStatuses?.[5] || "ส่งแล้ว";
      const startProductionStatus = state.data.settings.productionStatuses?.[0] || "รอเริ่ม";
      order[field] = value;
      if (field === "paymentStatus" && value === paidStatus) {
        createProductionFromOrder(order);
      }
      const linkedJob = state.data.production.find((item) => item.orderId === id || (item.customer === order.customer && item.packageName === order.packageName));
      if (field === "fulfillmentStatus" && value === deliveredOrderStatus && linkedJob) {
        linkedJob.status = deliveredProductionStatus;
      }
      if (field === "paymentStatus" && value !== paidStatus && linkedJob && linkedJob.status === startProductionStatus) {
        linkedJob.issue = "รอชำระ";
      }
      if (linkedJob) {
        touchSyncRecord(linkedJob, "production_jobs");
        queueSyncOperation("production", linkedJob);
      }
      touchSyncRecord(order, "orders");
      queueSyncOperation("orders", order);
      saveData();
      render();
    }

    function deriveTargetsFromPackages() {
      const pkg199 = getPackageById("pkg-199");
      const pkg799 = getPackageById("pkg-799");
      const pkg2999 = getPackageById("pkg-2999");
      const pkg5999 = getPackageById("pkg-5999");

      if (!pkg199 || !pkg799 || !pkg2999 || !pkg5999) {
        return;
      }

      state.data.businessTargets.monthlyMinimumRevenue =
        (pkg2999.price * 8) + (pkg799.price * 6) + (pkg199.price * 10);

      state.data.businessTargets.monthlyGoodRevenue =
        (pkg2999.price * 10) + (pkg799.price * 6) + (pkg5999.price * 1) + (pkg199.price * 8);
    }

    function updatePackageField(id, field, value) {
      const pkg = getPackageById(id);
      if (!pkg) return;
      pkg[field] = value;

      state.data.orders.forEach((order) => {
        if (order.packageName === pkg.name) {
          order.amount = pkg.price;
        }
      });

      state.data.production.forEach((job) => {
        if (job.packageName === pkg.name) {
          job.images = pkg.images;
        }
      });

      deriveTargetsFromPackages();
      saveData();
      render();
    }

    function updateTargetField(field, value) {
      state.data.businessTargets[field] = value;
      saveData();
      render();
    }

    function updateExpenseField(id, value) {
      const expense = state.data.expenses.find((item) => item.id === id);
      if (!expense) return;
      expense.amount = value;
      saveData();
      render();
    }

    function updateReserveSaved(value) {
      const reserve = state.data.cashReserve[0];
      const previousSaved = reserve.saved;
      const baseTotal = reserve.total - previousSaved;
      reserve.saved = value;
      reserve.total = Math.max(baseTotal + value, value);
      saveData();
      render();
    }

    function bindTask3Editors() {
      document.querySelectorAll("[data-package-id]").forEach((input) => {
        input.addEventListener("change", (event) => {
          const { packageId, field, type } = event.target.dataset;
          const nextValue = type === "number" ? Number(event.target.value || 0) : event.target.value;
          updatePackageField(packageId, field, nextValue);
        });
      });

      document.querySelectorAll("[data-target-field]").forEach((input) => {
        input.addEventListener("change", (event) => {
          updateTargetField(event.target.dataset.targetField, Number(event.target.value || 0));
        });
      });

      document.querySelectorAll("[data-expense-id]").forEach((input) => {
        input.addEventListener("change", (event) => {
          updateExpenseField(event.target.dataset.expenseId, Number(event.target.value || 0));
        });
      });

      const reserveInput = document.querySelector("[data-reserve-saved]");
      if (reserveInput) {
        reserveInput.addEventListener("change", (event) => {
          updateReserveSaved(Number(event.target.value || 0));
        });
      }
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return `"${text.replace(/"/g, '""')}"`;
    }

    function downloadCsv(filename, rows) {
      if (!rows.length) return;
      const headers = Object.keys(rows[0]);
      const csv = [
        headers.map(csvEscape).join(","),
        ...rows.map((row) => headers.map((key) => csvEscape(row[key])).join(","))
      ].join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function buildSystemAudit() {
      const paidChats = state.data.chats.filter((chat) => chat.status === "จ่ายแล้ว");
      const paidChatsWithoutOrders = paidChats.filter((chat) => {
        return !state.data.orders.some((order) => order.customer === chat.customer && order.packageName === chat.offer);
      });

      const paidOrders = state.data.orders.filter((order) => order.paymentStatus === "ชำระครบ");
      const paidOrdersWithoutProduction = paidOrders.filter((order) => {
        return !state.data.production.some((job) => job.orderId === order.id || (job.customer === order.customer && job.packageName === order.packageName));
      });

      const deliveredProductionWithoutOrderSync = state.data.production.filter((job) => {
        if (job.status !== "ส่งแล้ว") return false;
        const order = state.data.orders.find((item) => item.id === job.orderId || (item.customer === job.customer && item.packageName === job.packageName));
        return order && order.fulfillmentStatus !== "ส่งแล้ว";
      });

      const overRevisionJobs = state.data.production.filter((job) => Number(job.revisions || 0) > 1);
      const adOverBudget = totalRevenue() > 0
        ? adsExpenseTotal() > (totalRevenue() * state.data.businessTargets.adsPercentMax / 100)
        : false;

      let storageOk = true;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
      } catch {
        storageOk = false;
      }

      const checks = [
        {
          key: "paid-chat-to-order",
          label: "แชทที่จ่ายแล้วต้องมีออเดอร์",
          pass: paidChatsWithoutOrders.length === 0,
          detail: paidChatsWithoutOrders.length === 0 ? `ผ่าน ${paidChats.length} แชท` : `ตกหล่น ${paidChatsWithoutOrders.length} แชท`
        },
        {
          key: "paid-order-to-production",
          label: "ออเดอร์ชำระครบต้องมีงานผลิต",
          pass: paidOrdersWithoutProduction.length === 0,
          detail: paidOrdersWithoutProduction.length === 0 ? `ผ่าน ${paidOrders.length} ออเดอร์` : `ยังไม่สร้าง ${paidOrdersWithoutProduction.length} งาน`
        },
        {
          key: "delivery-sync",
          label: "งานผลิตส่งแล้วต้อง sync สถานะออเดอร์",
          pass: deliveredProductionWithoutOrderSync.length === 0,
          detail: deliveredProductionWithoutOrderSync.length === 0 ? "สถานะสอดคล้องกัน" : `ไม่ sync ${deliveredProductionWithoutOrderSync.length} งาน`
        },
        {
          key: "ad-budget",
          label: "ค่าแอดต้องไม่เกินกรอบที่ตั้งไว้",
          pass: !adOverBudget,
          detail: `${money(adsExpenseTotal())} จากกรอบ ${state.data.businessTargets.adsPercentMax}%`
        },
        {
          key: "revisions",
          label: "งานเกินรอบต้องถูกมองเห็น",
          pass: true,
          detail: `${overRevisionJobs.length} งานเกินรอบในระบบ`
        },
        {
          key: "storage",
          label: "localStorage พร้อมบันทึกข้อมูล",
          pass: storageOk,
          detail: storageOk ? "บันทึกข้อมูลได้" : "บันทึกข้อมูลไม่ได้"
        }
      ];

      return {
        checks,
        paidChatsWithoutOrders,
        paidOrdersWithoutProduction,
        deliveredProductionWithoutOrderSync,
        overRevisionJobs
      };
    }

        lastSuccessAt: state.data.sync.lastSuccessAt,
        history: (state.data.sync.history || []).slice(0, 5),

              <div class="chip-row">
                <span class="chip ${profit >= state.data.businessTargets.targetProfitLow ? "blue" : "warn"}">${profit >= state.data.businessTargets.targetProfitLow ? "กำไรถึงขั้นต่ำ" : "กำไรยังไม่ถึงขั้นต่ำ"}</span>
                <span class="chip ${(adsExpenseTotal() <= (revenue * state.data.businessTargets.adsPercentMax / 100)) ? "blue" : "danger"}">${(revenue > 0 && adsExpenseTotal() <= (revenue * state.data.businessTargets.adsPercentMax / 100)) ? "ค่าแอดยังอยู่ในกรอบ" : "ค่าแอดเริ่มสูง"}</span>
                <span class="chip ${pendingOrders <= 3 ? "sun" : "warn"}">${pendingOrders <= 3 ? "งานค้างยังพอคุมได้" : "งานค้างเริ่มเยอะ"}</span>
              </div>
            </article>
          </div>
        </section>

        ${renderSyncCenter()}

        <section class="section">
          <div class="section-head">
            <div>
              <h2>System Check</h2>
              <div class="section-sub">เช็ก flow หลัก กฎธุรกิจ และความพร้อมของข้อมูลก่อนใช้งานจริง</div>
            </div>
            <div class="chip-row">
              <span class="chip ${audit.checks.every((item) => item.pass) ? "blue" : "warn"}">${audit.checks.filter((item) => item.pass).length}/${audit.checks.length} checks ผ่าน</span>
            </div>
          </div>
          <div class="two-col">
            <article class="info-card">
              <div class="stat-list">
                ${audit.checks.map((item) => `
                  <div class="stat-row">
                    <strong>${item.label}</strong>
                    <span>${item.pass ? "ผ่าน" : "ต้องดู"} • ${item.detail}</span>
                  </div>
                `).join("")}
              </div>
            </article>
            <article class="info-card">
              <h3>จุดที่ควรตามต่อ</h3>
              <div class="stat-list">
                <div class="stat-row"><strong>แชทจ่ายแล้วแต่ออเดอร์ยังไม่มา</strong><span>${audit.paidChatsWithoutOrders.length} รายการ</span></div>
                <div class="stat-row"><strong>ออเดอร์ชำระครบแต่งานผลิตยังไม่ขึ้น</strong><span>${audit.paidOrdersWithoutProduction.length} รายการ</span></div>
                <div class="stat-row"><strong>งานส่งแล้วแต่สถานะออเดอร์ยังไม่ sync</strong><span>${audit.deliveredProductionWithoutOrderSync.length} รายการ</span></div>
                <div class="stat-row"><strong>งานเกินรอบแก้</strong><span>${audit.overRevisionJobs.length} งาน</span></div>
              </div>
              <div class="inline-note">
                ${audit.checks.every((item) => item.pass)
                  ? "โฟลว์หลักของระบบผ่านทั้งหมดในข้อมูลชุดนี้ พร้อมใช้เป็นฐานต่อยอดหรือเริ่มทดสอบงานจริง"
                  : "ยังมีบางจุดที่ระบบมองเห็นและแจ้งไว้แล้ว คุณใช้ส่วนนี้เป็น checklist ก่อนเริ่มใช้กับข้อมูลจริงได้เลย"}
              </div>
            </article>
          </div>
        </section>
      `;
    }

    function renderContent() {
      const sections = {
        overview: renderOverview() + renderPackages(),
        "content-calendar": renderContentCalendarV2(),
        "weekly-ads": renderWeeklyAdsV2(),
        "ad-monitor": renderAdMonitor(),
        "chat-monitor": renderChatMonitor(),
        orders: renderOrders(),
        production: renderProduction(),
        reports: renderReportsV2()
      };

      const content = document.getElementById("content");
      content.innerHTML = sections[state.activeMenu] || `<section class="section"><div class="empty-state">ยังไม่มีเนื้อหาส่วนนี้</div></section>`;
      bindTask3Editors();
      bindContentEditors();
      bindWeeklyAdsEditors();
      bindChatEditors();
      bindAdEditors();
      bindOrderEditors();
      bindProductionEditors();
      bindReportActions();
    }

    function renderTopbar() {
      const menu = menus.find((item) => item.id === state.activeMenu);
      document.getElementById("pageTitle").textContent = menu ? menu.label : "Morning Pic 369";
      document.getElementById("pageSubtitle").textContent = `${state.data.settings.businessName} · ข้อมูลตัวอย่างพร้อมใช้งานในเครื่อง`;
      document.getElementById("rangeSelect").value = state.range;
      document.getElementById("dateInput").value = state.date;
    }

    function render() {
      renderMenu();
      renderTopbar();
      renderContent();
    }

    document.getElementById("resetDataBtn").addEventListener("click", resetData);
    document.getElementById("rangeSelect").addEventListener("change", (event) => {
      state.range = event.target.value;
      renderTopbar();
    });
    document.getElementById("dateInput").addEventListener("change", (event) => {
      state.date = event.target.value;
      renderTopbar();
    });

    render();
  </script>
</body>
</html>
